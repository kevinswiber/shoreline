name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish crate and GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag and version
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          TAG="${TAG#refs/tags/}"
          if [[ "$TAG" != v* ]]; then
            TAG="v${TAG#v}"
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Checkout release tag
        shell: bash
        run: |
          set -euo pipefail
          git checkout "${{ steps.meta.outputs.tag }}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node (app.js verify)
        uses: actions/setup-node@v4
        with:
          node-version-file: src/cli/inspect/web/.nvmrc
          cache: npm
          cache-dependency-path: src/cli/inspect/web/package-lock.json

      - name: Verify committed app.js matches a fresh build
        working-directory: src/cli/inspect/web
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build -- --outfile="$RUNNER_TEMP/app.js"
          cmp "$RUNNER_TEMP/app.js" ../assets/app.js \
            || { echo "::error::Release blocked — committed assets/app.js is stale vs a fresh build (run 'just web-build' and commit)."; exit 1; }

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          crate_version_published() {
            curl -fsS "https://crates.io/api/v1/crates/shoreline/${VERSION}" >/dev/null 2>&1
          }

          if crate_version_published; then
            echo "shoreline ${VERSION} is already published; skipping"
            exit 0
          fi

          for attempt in $(seq 1 5); do
            if cargo publish -p shoreline --locked; then
              exit 0
            fi
            if crate_version_published; then
              echo "shoreline ${VERSION} is already published after publish retry ${attempt}; continuing"
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "Publish attempt ${attempt}/5 failed for shoreline; retrying after crates.io propagation delay"
              sleep 30
            fi
          done

          echo "error: failed to publish shoreline ${VERSION}" >&2
          exit 1

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: shoreline ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
