[env]
_.path = [
  "{{config_root}}/target/release",
  "{{config_root}}/target/debug",
]
# `cargo +stable` (build/test) and `cargo +nightly` (rustfmt) auto-install their
# toolchain on first use instead of erroring; mirrors the Nix dev shell.
RUSTUP_AUTO_INSTALL = "1"

[tools]
github-cli = "latest"
jq = "latest"
just = "latest"
node = "22"
"cargo:cargo-edit" = "latest"
"cargo:cargo-nextest" = "latest"

[tools."cargo:cocogitto"]
version = "6.5"
postinstall = "cog install-hook --all --overwrite"

[settings]
experimental = true
